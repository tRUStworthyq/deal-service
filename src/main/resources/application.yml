spring:
  application:
    name: deal-service
  datasource:
    url: jdbc:postgresql://localhost:5432/deal_db
    username: deal_user
    password: deal_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/sber-realm/protocol/openid-connect/certs

app:
  kafka:
    bootstrap-servers: localhost:9092
    request-topic: risk-requests
    reply-topic: risk-responses
    reply-timeout-ms: 10000
    client-events-topic: client-events
    deal-events-topic: deal-events
    risk-events-topic: risk-events
    event-results-topic: entity-event-results
  grpc:
    currency-service:
      host: localhost
      port: 9090

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans


logging:
  level:
    ru.sber: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
  logstash:
    encoder:
      destination: "localhost:5000"